name: Cross-repo alignment

# Early warning that a pending spec change breaks a consumer, before a tag
# is cut: a red run here blocks tagging, not merging.
on:
  schedule:
    - cron: "17 4 * * *"
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  jaxstanv5-consume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: bayeswire
      - uses: actions/checkout@v4
        with:
          repository: StefanSko/jaxstanv5
          path: jaxstanv5
      - uses: astral-sh/setup-uv@v5
      - name: Install jaxstanv5 against bayeswire HEAD
        working-directory: jaxstanv5
        run: |
          uv sync
          uv pip install --reinstall ../bayeswire
      - name: Consume-conformance against this bayeswire
        working-directory: jaxstanv5
        run: uv run pytest tests/integration/test_consume_conformance.py -q

  bayescycle-nojax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: bayeswire
      - uses: actions/checkout@v4
        with:
          repository: StefanSko/bayescycle
          path: bayescycle
      - uses: astral-sh/setup-uv@v5
      - name: Install bayescycle against bayeswire HEAD (no JAX)
        working-directory: bayescycle
        run: |
          uv sync
          uv pip install --reinstall ../bayeswire
      - name: Workflow test subset with bayeswire HEAD
        working-directory: bayescycle
        run: uv run pytest -q

  normative-prose-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: StefanSko/jaxstanv5
          path: jaxstanv5
      - uses: actions/checkout@v4
        with:
          repository: StefanSko/bayescycle
          path: bayescycle
      - uses: actions/checkout@v4
        with:
          repository: StefanSko/bayesite
          path: bayesite
      - name: Only bayeswire carries normative wire-format prose
        run: |
          set -e
          # The retired envelope key must not appear in consumers at all;
          # bayesite's vendored spec copies are generated bytes and excluded.
          ! grep -rn "jaxstanv5_ir" jaxstanv5 bayescycle --include="*.py" --include="*.md" --include="*.rs" \
            | grep -v "docs/bayeswire-migration.md" || { echo "retired envelope key found"; exit 1; }
          ! grep -rn "jaxstanv5_ir" bayesite --include="*.rs" --include="*.py" || { echo "retired envelope key found in bayesite code"; exit 1; }
